<!-- HTML 주석 -->

<!DOCTYPE html> <!-- HTML 문서 선언-->
<html>   <!---문서 시작 -->
<head>
<meta charset="UTF-8"> <!-- 한글 안깨지도록 방지 유니코드방식-->
<title>BMI Calculator</title> <!-- 브라우저 이름-->

<link rel="stylesheet" href="./style.css"/>

</head>

<body>

<div class="container"> <!-- 계산기 박스 -->

<h1>BMI Calculator</h1> <!-- 제목 -->

<input type="number" id="height" placeholder="키 (cm)">
<input type="number" id="weight" placeholder="체중 (kg)">
<input type="number" id="age" placeholder="나이(만)">
<input type="text" id="gender" placeholder="성별 (남/여)">

<button onclick="calcBMI()">BMI 계산</button> <!-- 버튼 클릭시 calc 함수 실행-->

<div class="result" id="result"></div> <!-- 결과 출력 공간-->

</div>


<script src="index.js"></script>

</body>
</html>
